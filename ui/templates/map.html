<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Urban Clean | Live Map</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/styles.css">
  </head>
  <body>
    <div class="dashboard-container">
      <aside class="sidebar">
        <div class="brand">
          <i class="fas fa-leaf"></i>
          <span>Urban Clean</span>
        </div>
        <nav class="nav-menu">
          <li class="nav-item">
            <a href="/" class="nav-link">
              <i class="fas fa-chart-pie"></i>
              <span>Dashboard</span>
            </a>
          </li>
          <li class="nav-item">
            <a href="/map" class="nav-link active">
              <i class="fas fa-map-marked-alt"></i>
              <span>Live Map</span>
            </a>
          </li>
          <li class="nav-item">
            <a href="/dashboard" class="nav-link">
              <i class="fas fa-boxes"></i>
              <span>Asset Management</span>
            </a>
          </li>
        </nav>
        <div class="sidebar-footer">
          <a href="#" class="nav-link">
            <i class="fas fa-cog"></i>
            <span>Settings</span>
          </a>
        </div>
      </aside>

      <main class="main-content" style="padding: 0;">
        <div id="map-container" style="width: 100%; height: 100vh; position: relative;">
          <svg id="map-svg"></svg>
          
          <!-- Map Overlay Controls -->
          <div class="map-overlay" style="position: absolute; top: 2rem; right: 2rem; display: flex; flex-direction: column; gap: 1rem; width: 300px; z-index: 10;">
            <div class="glass-card">
              <h3 style="font-size: 1rem; margin-bottom: 1rem;">Map Filters</h3>
              <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; cursor: pointer;">
                  <input type="checkbox" checked onchange="toggleLayer('bins')"> Show Bins
                </label>
                <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; cursor: pointer;">
                  <input type="checkbox" checked onchange="toggleLayer('trucks')"> Track Trucks
                </label>
                <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; cursor: pointer;">
                  <input type="checkbox" checked onchange="toggleLayer('plants')"> Processing Plants
                </label>
              </div>
            </div>

            <div class="glass-card" id="location-details" style="display: none; position: relative;">
              <button onclick="this.parentElement.style.display='none'" style="position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: var(--text-muted); cursor: pointer;"><i class="fas fa-times"></i></button>
              <h3 style="font-size: 1rem; margin-bottom: 0.5rem;" id="detail-name">Location Name</h3>
              <p style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 1rem;" id="detail-type">Type: Collection Point</p>
              <div style="margin-bottom: 1rem;">
                <div style="display: flex; justify-content: space-between; font-size: 0.75rem; margin-bottom: 0.25rem;">
                  <span>Resource Level</span>
                  <span id="detail-level">85%</span>
                </div>
                <div style="height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden;">
                  <div id="detail-progress" style="width: 85%; height: 100%; background: var(--primary);"></div>
                </div>
              </div>
              <button class="control-btn" style="width: 100%; font-size: 0.875rem; padding: 0.5rem;">Request Action</button>
            </div>
          </div>

          <div style="position: absolute; bottom: 2rem; left: 2rem;" class="glass-card">
            <div style="display: flex; gap: 1.5rem; font-size: 0.75rem; font-weight: 700; color: var(--text-main);">
                <div style="display: flex; align-items: center; gap: 0.5rem;"><span class="dot" style="background: #059669; border: 1px solid #fff;"></span> Bins</div>
                <div style="display: flex; align-items: center; gap: 0.5rem;"><span class="dot" style="background: #2563eb; border: 1px solid #fff;"></span> Trucks</div>
                <div style="display: flex; align-items: center; gap: 0.5rem;"><span class="dot" style="background: #d97706; border: 1px solid #fff;"></span> Segregation</div>
                <div style="display: flex; align-items: center; gap: 0.5rem;"><span class="dot" style="background: #7c3aed; border: 1px solid #fff;"></span> Processing</div>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script src="/static/js/map.js"></script>
  </body>
</html>
