<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Urban Clean Map</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background-color: #f0f0f0;
      }
      #map-container {
        width: 100vw;
        height: 100vh;
        position: relative;
      }
      svg {
        width: 100%;
        height: 100%;
      }
      .node {
        fill: #4caf50;
        stroke: #2e7d32;
        stroke-width: 2;
      }
      .node.emergency {
        fill: #f44336;
      }
      .node.govt-building {
        fill: #2196f3;
      }
      .node.private-corp {
        fill: #ff9800;
      }
      .node.urban-loc {
        fill: #9c27b0;
      }
      .node.tourist {
        fill: #00bcd4;
      }
      .edge {
        stroke: #666;
        stroke-width: 1;
      }
      .node-label {
        font-size: 10px;
        text-anchor: middle;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="map-container">
      <svg id="map-svg"></svg>
    </div>
    <script src="/static/js/map.js"></script>
  </body>
</html>
