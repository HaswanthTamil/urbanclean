<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Urban Clean | Add Live Waste</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
      .form-group {
        margin-bottom: 1.5rem;
      }
      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: var(--text-main);
      }
      .form-control {
        width: 100%;
        padding: 0.75rem 1rem;
        border-radius: 0.5rem;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-main);
        font-family: inherit;
        font-size: 1rem;
        transition: all 0.3s ease;
      }
      .form-control:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.2);
      }
      .form-control option {
        background: #1e1e24; /* Fallback dark bg for options */
        color: white;
      }
      .toast {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        padding: 1rem 1.5rem;
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--success);
        border-radius: 0.75rem;
        color: var(--text-main);
        transform: translateY(100px);
        opacity: 0;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        z-index: 1000;
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="dashboard-container">
      <aside class="sidebar">
        <div class="brand">
          <i class="fas fa-leaf"></i>
          <span>Urban Clean</span>
        </div>
        <nav class="nav-menu">
          <li class="nav-item">
            <a href="/" class="nav-link">
              <i class="fas fa-chart-pie"></i>
              <span>Dashboard</span>
            </a>
          </li>
          <li class="nav-item">
            <a href="/map" class="nav-link">
              <i class="fas fa-map-marked-alt"></i>
              <span>Live Map</span>
            </a>
          </li>
          <li class="nav-item">
            <a href="/input" class="nav-link active">
              <i class="fas fa-plus-circle"></i>
              <span>Add Waste</span>
            </a>
          </li>
          <li class="nav-item">
            <a href="/fleet" class="nav-link">
              <i class="fas fa-truck"></i>
              <span>Fleet Status</span>
            </a>
          </li>
          <li class="nav-item">
            <a href="/plants" class="nav-link">
              <i class="fas fa-industry"></i>
              <span>Plants</span>
            </a>
          </li>
        </nav>
        <div class="sidebar-footer">
          <a href="#" class="nav-link">
            <i class="fas fa-cog"></i>
            <span>Settings</span>
          </a>
        </div>
      </aside>

      <main class="main-content">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
          <div>
            <h1 style="color: var(--text-main); font-size: 1.875rem;">Input Data Simulation</h1>
            <p style="color: var(--text-muted);">Manually register live waste to update system state dynamically.</p>
          </div>
        </header>

        <section style="max-width: 600px; margin: 0 auto;">
          <div class="glass-card">
            <h3 style="font-size: 1.25rem; margin-bottom: 1.5rem; text-align: center;">Register New Waste Collection</h3>
            
            <form id="add-waste-form">
              <div class="form-group">
                <label for="bin-select">Target Bin</label>
                <select id="bin-select" class="form-control" required>
                  <option value="" disabled selected>Loading bins...</option>
                </select>
              </div>

              <div class="form-group">
                <label for="waste-type">Waste Type</label>
                <select id="waste-type" class="form-control" required>
                  <option value="" disabled selected>Select waste type</option>
                  <option value="bio-degradable">Bio-degradable</option>
                  <option value="recyclable">Recyclable</option>
                  <option value="plastic">Plastic</option>
                  <option value="hazardous">Hazardous / Medical</option>
                  <option value="e-waste">E-Waste</option>
                </select>
              </div>

              <div class="form-group">
                <label for="waste-volume">Volume (kg)</label>
                <input type="number" id="waste-volume" class="form-control" placeholder="e.g., 25.5" step="0.1" min="0.1" required>
              </div>

              <button type="submit" class="control-btn" style="width: 100%; margin-top: 1rem; padding: 0.875rem; font-size: 1rem;">
                <i class="fas fa-paper-plane" style="margin-right: 0.5rem;"></i> Inject Waste Data
              </button>
            </form>
          </div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast">
      <i class="fas fa-check-circle" style="color: var(--success); font-size: 1.25rem;"></i>
      <span id="toast-msg">Waste added successfully!</span>
    </div>

    <script>
      // Load Bins to populate select
      async function loadBins() {
        try {
          const res = await fetch('/api/bins-stats');
          const bins = await res.json();
          const select = document.getElementById('bin-select');
          select.innerHTML = '<option value="" disabled selected>Select a bin</option>';
          
          bins.forEach(bin => {
            const types = bin.waste_type.join(', ');
            let locText = bin.id;
            select.innerHTML += `<option value="${bin.id}">${bin.id} (${types}) - ${bin.current_percentage.toFixed(1)}% full</option>`;
          });
        } catch (error) {
          console.error("Error loading bins:", error);
          document.getElementById('bin-select').innerHTML = '<option value="" disabled>Error loading bins</option>';
        }
      }

      loadBins();

      // Handle form submission
      document.getElementById('add-waste-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const binId = document.getElementById('bin-select').value;
        const type = document.getElementById('waste-type').value;
        const volume = parseFloat(document.getElementById('waste-volume').value);
        const submitBtn = e.target.querySelector('button[type="submit"]');

        if (!binId || !type || isNaN(volume)) return;

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right: 0.5rem;"></i> Processing...';

        try {
          const response = await fetch('/api/add-waste', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ bin_id: binId, waste_type: type, volume: volume })
          });

          const result = await response.json();
          
          if (result.success) {
            showToast(`Successfully added ${volume}kg to ${binId}`);
            document.getElementById('waste-volume').value = '';
            // Reload bin states
            loadBins();
          } else {
            alert(result.error || "Failed to add waste.");
          }
        } catch (error) {
          console.error(error);
          alert("Network error.");
        } finally {
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<i class="fas fa-paper-plane" style="margin-right: 0.5rem;"></i> Inject Waste Data';
        }
      });

      function showToast(message) {
        const toast = document.getElementById('toast');
        document.getElementById('toast-msg').innerText = message;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
      }
    </script>
  </body>
</html>
